type: object
description: Opening day structure.
properties:
  day_id:
    type: string
    description: The unique ID of the day of the week.
    example: "MON"
  time_intervals:
    type: array
    items:
      $ref: '../schemas/_index.yaml#/TimeInterval'
    description: List of time Intervals.
required:
  - day_id
  - time_intervals