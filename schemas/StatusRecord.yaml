type: object
description: Customer status record.
properties:
  status_record_id:
    type: string
    readOnly: true
    description: The unique ID of the status record.
    example: "87ac34ef46f3858a4ece61fb43"
  status_id:
    type: string
    description: The unique ID of the status.
    example: "86e05affc7a7abefcd513ab400"
  customer_id:
    type: string
    description: The unique ID of the customer.
    example: "89ac83ca207a820c62c79bf03a"
  valid_from:
    type: string
    readOnly: true
    description: "Timestamp from which the status record is valid. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2019-05-29 00:00:00"
  valid_to:
    type: string
    readOnly: true
    description: "Timestamp until which the status record is valid. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2021-05-28 23:59:59"
  purchase_conditions:
    $ref: '../schemas/_index.yaml#/PurchaseConditions'
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2020-08-06 10:31:09"
  state:
    type: integer
    enum:
      - 0
      - 1
      - 2
    readOnly: true
    description: |
      State of the reward.
      *Possible values are: 0 - deleted / 1 - active / 2 - non active*
    example: 1
required:
  - status_id
  - customer_id