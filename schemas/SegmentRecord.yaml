type: object
description: Customer segment record.
properties:
  segment_id:
    type: string
    description: The unique ID of the segment.
    example: "83caed4c60c6be7e4392cc25ed"
  customer_id:
    type: string
    description: The unique ID of the customer.
    example: "89ac83ca207a820c62c79bf03a"
  created_at:
    type: string
    readOnly: true
    description: "Timestamp of the segment record creation. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2021-06-20 16:59:49"
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2019-08-29 13:04:45"
required:
  - segment_id
  - customer_id
  - created_at