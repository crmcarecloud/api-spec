type: object
description: Credit type resource.
properties:
  credit_type_id:
    type: string
    readOnly: true
    description: The unique ID of the credit type.
    example: "86e05affc7a7abefcd513ab400"
  name:
    type: string
    readOnly: true
    description: Name of the credit type.
    example: "Addition"
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2022-04-05 07:46:44.190403"
