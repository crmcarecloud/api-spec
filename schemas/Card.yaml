type: object
description: Card resource.
properties:
  card_id:
    type: string
    readOnly: true
    description: The unique ID of the card.
    example: "81eaeea13b8984a169c490a325"
  customer_id:
    type: string
    description: The unique ID of the card holder. [GET /customers](https://carecloud.readme.io/reference/getcustomers)
    example: "8ea2591121e636086a4a9c0992"
  card_type_id:
    type: string
    description: The unique ID of the card type. [GET /card-types](https://carecloud.readme.io/reference/getcardtypes)
    example: "8bed991c68a470e7aaeffbf048"
  card_number:
    type: string
    description: Card number.
    example: "1000000000016"
  secondary_card_number:
    type: string
    description: Alternative card number for this card.
    example: "AXNFUAIOHFDSNKA"
  valid_from:
    type: string
    description: "Timestamp from which the card is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2021-04-14 00:00:00"
  valid_to:
    type: string
    description: "Timestamp until which the card is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2059-07-05 00:00:00"
  store_id:
    type: string
    description: The unique ID of the store where the card was assigned to a customer. [GET /stores](https://carecloud.readme.io/reference/getstores)
    example:
  last_change:
    type: string
    readOnly: true
    description: Date and time of the last change. *(YYYY-MM-DD HH:MM:SS)*
    example: "2019-07-15 17:26:34"
  state:
    type: integer
    enum:
      - 0
      - 1
    description: |
      State of the card.
      *Possible values are: 0 - blocked / 1 - active*
    example: 1
required:
  - card_type_id
  - card_number
  - state