type: object
description: Booking item structure.
properties:
  booking_item_id:
    type: string
    description: The unique ID of the booking item.
    example: "8fd73167342d0689c4c015320"
  customer_id:
    type: string
    description: The unique ID of the customer. [GET /customers](https://carecloud.readme.io/reference/getcustomers)
    example: "8ea6abece4cd0a4ded0a29f093"
  time_slot_id:
    type: string
    description: The unique ID of the booking time slot.
    example: "88bb88399cc74d81edbe19d684"
  booking_ticket:
    $ref: '../schemas/_index.yaml#/BookingTicket'
  valid_from:
    type: string
    readOnly: true
    description: Date and time when time slot starts. *(YYYY-MM-DD HH:MM:SS)*
    example: "2022-01-09 22:00:00"
  valid_to:
    type: string
    readOnly: true
    description: Date and time when time slot ends. *(YYYY-MM-DD HH:MM:SS)*
    example: "2022-01-09 22:30:00"
  capacity_taken:
    type: integer
    description: How much capacity is taken by the booking item. If not set, value is 1.
    default: 1
    example: 2
  booking_item_status:
    type: string
    description: The current status of the booking item. If not set, CareCloud uses the default booking status. [GET /booking-statuses](https://carecloud.readme.io/reference/getbookingstatuses)
    example: "86e05affc7a7abefcd513ab400"
  additional_properties:
    type: array
    items:
      $ref: '../schemas/_index.yaml#/PropertyRecord'
    readOnly: true
    description: List of additional property records.
  created_at:
    type: string
    description: "Timestamp of the booking item. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2017-06-20 16:59:49"
  state:
    type: integer
    enum:
      - 0
      - 1
      - 2
    readOnly: true
    description: |
      State of the booking item record.
      *Possible values are: 0 - deleted / 1 - active / 2 - non active*
    example: 1
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: '2013-07-24 21:33:33'
required:
  - time_slot_id
  - created_at