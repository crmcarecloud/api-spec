type: object
description: Campaign resource.
properties:
  idcampaign:
    type: string
    deprecated: true
    readOnly: true
    description: |
      The unique ID of the campaign. 
      ⚠️ This parameter is deprecated, please use `campaign_id` instead.
      Please be aware this parameter can be referred in different endpoints as `campaign_id`.
    example: "8bed991c68a470e7aaeffbf048"
  campaign_id:
    type: string
    readOnly: true
    description: |
      The unique ID of the campaign.
    example: "8bed991c68a470e7aaeffbf048"
  external_id:
    type: string
    description: The external ID of the campaign.
    example: 1
  parent_id:
    type: string
    description: The unique ID of the parent campaign.
    example: null
  name:
    type: string
    description: Name of the campaign.
    example: "Standard campaign"
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2021-04-16 18:22:35.052987"
  state:
    type: integer
    enum:
      - 0
      - 1
      - 2
    readOnly: true
    description: |
      State of the campaign.
      *Possible values are: 0 - deleted / 1 - active / 2 - non active*
    example: 1
required:
  - name
