type: object
description: Segment group structure.
properties:
  segment_group_id:
    type: string
    readOnly: true
    description: The unique ID of the segment group.
    example: "83d1d11ea3884a5d33253fe214"
  name:
    type: string
    description: Name of the segment group.
    example: "RFM Badges"
  parent_group_id:
    type: string
    readOnly: true
    description: The unique ID of the parent segment group.
    example: "8bed991c68a470e7aaeffbf048"
  note:
    type: string
    description: Short description of the segment group.
    example: "RFM Badges for tagging customers"
  text_id:
    type: string
    readOnly: true
    description: It represents unique readable ID of the segment group.
    example: rfm_badges
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2022-04-21 08:26:36.058922"
required:
  - name