type: object
description: Customer source.
properties:
  customer_source_record_id:
    type: string
    description: The unique ID of the customer source record.
    readOnly: true
    example: "8fd73167342d06899c4c015320"
  customer_source_id:
    type: string
    description: >
      The unique ID of the customer source. It identifies the system where the customer belongs or the customer account was created. For the list of all available customer sources please look at: [customer-sources](https://carecloud.readme.io/reference/getcustomersources).
    example: "86e05affc7a7abefcd513ab400"
  customer_id:
    type: string
    readOnly: true
    description: The unique ID of the customer.
    example: "87af991126405bf8e7dfb36045"
  external_ids:
    type: array
    items:
      type: string
    description: >
      The list of external IDs of the customer in the external system. Use this field instead of the
      deprecated `external_id`. Supports multiple identifiers for the same customer source - for example,
      one ID per browser installation (laptop, phone).

      In requests: if `external_ids` is provided, `external_id` is ignored.
      In responses: the deprecated `external_id` field returns the first value from this array.
    example:
      - "A66854921C"
      - "B77965032D"
  external_id:
    type: string
    deprecated: true
    description: >
      The external ID of the customer in the external system. Deprecated - use `external_ids` instead.
      This field is retained for backward compatibility and will be removed in a future major version.
      In responses, this field returns the first value from `external_ids` when multiple external IDs are present.
    example: "A66854921C"
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2019-06-23 11:47:22"
required:
  - customer_source_id
