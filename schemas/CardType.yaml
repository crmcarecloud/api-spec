type: object
description: CardType resource.
properties:
  card_type_id:
    type: string
    readOnly: true
    description: The unique ID of the card type.
    example: "8bd48117006496e0b1788109b8"
  text_id:
    type: string
    readOnly: true
    description: The unique text identifier of the card type.
    example: "isic_card"
  name:
    type: string
    description: Name of the card type.
    example: "Postman test type"
  prefix:
    type: string
    description: Prefix of the specific card type cards.
    example: "092"
required:
  - name
  - prefix