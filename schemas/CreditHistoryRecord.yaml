type: object
description: Credit history record.
properties:
  customer_id:
    type: string
    readOnly: true
    description: The unique ID of the customer. [GET /customers](https://carecloud.readme.io/reference/getcustomers)
    example: "8ea2591121e636086a4a9c0992"
  amount:
    type: number
    format: float
    readOnly: true
    description: The number of credits used in the credit operation record.
    example: 1000
  credit_operation_type:
    type: string
    readOnly: true
    description: Type of the credit operation record.
    example: "Manually added credits"
  credit_operation_note:
    type: string
    readOnly: true
    description: Note of the credit operation record.
    example: "Addition"
  partner_id:
    type: string
    readOnly: false
    description: The unique ID of the partner company. [GET /partners](https://carecloud.readme.io/reference/getpartners)
    example: "86e05affc7a7abefcd513ab400"
  currency_id:
    type: string
    readOnly: true
    description: The unique ID of the currency. [GET /currencies](https://carecloud.readme.io/reference/getcurrencies)
    example: "86e05affc7a7abefcd513ab400"
  store_id:
    type: string
    readOnly: true
    description: The unique ID of the store. [GET /stores](https://carecloud.readme.io/reference/getstores)
    example: "81eaeea13b8984a169c490a325"
  credit_history_record_time:
    type: string
    readOnly: true
    description: "Timestamp of the credit record in the credit history. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2023-03-07 09:53:55"