type: object
description: Customer point record.
properties:
  point_id:
    type: string
    readOnly: true
    description: The unique ID of the point record.
    example: "8bd48117006496e0b1788109b8"
  customer_id:
    type: string
    description: The unique ID of the customer. [GET /customers](https://carecloud.readme.io/reference/getcustomers)
    example: "87af991126405bf8e7dfb36045"
  assigned_points:
    type: number
    format: float
    readOnly: true
    description: The number of earned points.
    example: 50
  available_points:
    type: number
    format: float
    readOnly: true
    description: The number of points available actually taking into account the eventual points redemption.
    example: 700
  point_type_id:
    type: string
    description: The unique ID of the point type. [GET /point-types](https://carecloud.readme.io/reference/getpointtypes)
    example: "81eaeea13b8984a169c490a325"
  partner_id:
    type: string
    description: The unique ID of the partner company. [GET /partners](https://carecloud.readme.io/reference/getpartners)
    example: "86e05affc7a7abefcd513ab400"
  valid_to:
    type: string
    description: "Timestamp until which the point record is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2023-09-16 23:59:59"
  state:
    type: integer
    enum:
      - 0
      - 1
      - 2
    readOnly: true
    description: |
      State of the point record.
      *Possible values are: 0 - deleted / 1 - active / 2 - non active*
    example: 1
  created_at:
    type: string
    description: "Timestamp of the point record creation. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2016-06-30 15:05:49"
  note:
    type: string
    description: Note for the new point record.
    example: "Birthdate point reward"
required:
  - customer_id
  - point_type_id
  - partner_id