type: object
description: Ticket of the booking item. Structure is filled only when query parameter `add_booking_items` has value `full` or `items-only`.
properties:
  ticket_id:
    type: string
    readOnly: true
    description: The unique ID of the booking ticket.
    example: "89d88719b8b442de2d11b401a2"
  name:
    type: string
    description: Name of the booking ticket in language from request header.
    example: "Prophecy"
  created_at:
    type: string
    description: "Timestamp of the ticket creation. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2022-07-26 11:38:22"
  valid_from:
    type: string
    description: "Timestamp from which the ticket is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
  valid_to:
    type: string
    description: "Timestamp until which the ticket is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
  state:
    type: integer
    enum:
      - 0
      - 1
    description: |
      State of the booking ticket.
      *Possible values are: 0 - blocked / 1 - active*
    example: 1
  last_change:
    type: string
    readOnly: true
    description: Date and time of the last change. *(YYYY-MM-DD HH:MM:SS)*
    example: "2022-09-16 16:14:41"
required:
  - name