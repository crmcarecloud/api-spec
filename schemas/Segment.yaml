type: object
description: Segment structure.
properties:
  segment_id:
    type: string
    readOnly: true
    description: The unique ID of the segment.
    example: "82de12eb8b138791e678fd11c3"
  name:
    type: string
    readOnly: false
    description: Name of the segment.
    example: "VIP customers"
  segment_group_id:
    type: string
    readOnly: true
    description: The unique ID of the segment group. [GET /segment-groups](https://carecloud.readme.io/reference/getsegmentgroups)
    example: "8bed991c68a470e7aaeffbf048"
  segment_picture_url:
    type: string
    readOnly: true
    description: URL of the picture assigned to the segment.
    example:
  note:
    type: string
    readOnly: false
    description: Short description of the segment.
    example: "VIP customers note test"
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2021-06-04 13:25:39"
required:
  - name