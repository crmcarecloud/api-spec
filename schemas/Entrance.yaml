type: object
description: Entrance structure.
properties:
  entrance_id:
    type: string
    description: The unique ID of the entrance.
    example: "80a7be2e78aabc1454ca817265"
  pos_id:
    description:  'ID of POS system for tickets. Required with path parameter entrance ID. *Possible values are: EPOS - 3 / skidata - 6 / axess - 9 / base - 11*'
    type: integer
    enum:
      - 3
      - 6
      - 9
      - 11
  name:
    type: string
    readOnly: true
    description: Name of the entrance.
    example: "1 Dňový Skipas - Akcia 7.1. - 22.1.2015"
  customer_id:
    type: string
    readOnly: true
    description: The unique ID of the customer. [GET /customers](https://carecloud.readme.io/reference/getcustomers)
    example:
  resort_name:
    type: string
    readOnly: true
    description: Name of the resort where the entrance is charged.
    example:
  customer_category_name:
    type: string
    readOnly: true
    description: Name of the customer category.
    example:
  external_order_id:
    type: string
    readOnly: true
    description: ID of an external order created in the POS system.
    example: "d03df0e0-959a-11e4-a6ce-0050569b002b"
  external_entrance_id:
    type: string
    readOnly: true
    description: External ID of the entrance. Structure can be different depending on the POS system that created the entrance.
    example: "1-1760-61-107788"
  external_turnstile_permission_id:
    type: string
    readOnly: true
    description: External ID of the permission to open a turnstile. Structure can be different depending on the POS system that created the permission.
    example: "1-1760-61-107788"

  entrance_type_id:
    type: integer
    enum:
      - 0
      - 1
      - 2
    description: 'Type of the entrance. *Possible values are: season ticket - 0 / one day ticket - 1 / multiple day ticket - 2*'
    example: 1
  order_item_id:
    type: string
    readOnly: true
    description: Order ID item represents relation between entrance and order item from carecloud e-shop.
    example: "84947e1aa1ad6982cc8188d15c"
  card_id:
    type: string
    readOnly: true
    description: The unique ID of the card used to charge the entrance. [GET /cards](https://carecloud.readme.io/reference/getcards)
    example: "8c9fd120242ef646f477a5ed80"
  created_at:
    type: string
    readOnly: true
    description: "Timestamp of the entrance creation in CareCloud. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2015-01-06 12:54:46"
  cancelled_at:
    type: string
    readOnly: true
    description: "Timestamp of the entrance cancellation in CareCloud. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2015-01-09 22:38:48.088"
  charged_price:
    type: number
    format: float
    readOnly: true
    description: Price charged to POS system.
    example:
  product_ids:
    type: string
    readOnly: true
    description: The unique ID of the product. [GET /products](https://carecloud.readme.io/reference/getproducts)
    example:
  charge_date:
    type: string
    readOnly: true
    description: "Timestamp when the entrance will be or was charged to the POS system. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2015-01-10 00:00:00"
  valid_from:
    type: string
    readOnly: true
    description: "Date of the first day when the customer can use the entrance in ISO-8601 format (`YYYY-MM-DD`)."
    example:
  valid_to:
    type: string
    readOnly: true
    description: "Date of the last day when the customer can use the entrance in ISO-8601 format (`YYYY-MM-DD`)."
    example:
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2019-08-29 13:04:45"
  state:
    type: integer
    enum:
      - 0
      - 1
    description: 'State of the entrance. *Possible values are: 0 - cancelled / 1 - active*'
    example: 1
required:
  - entrance_id
  - card_id
  - state
  - pos_id