type: object
description: Campaign product structure.
properties:
  campaign_product_id:
    type: string
    readOnly: true
    description: The unique ID of the campaign product.
    example: "8bed991c68a470e7aaeffbf048"
  product_id:
    type: string
    description: The unique ID of the product. [GET /products](https://carecloud.readme.io/reference/getproducts)
    example: "8ad4ff4db9d628f2c8cb6181a4"
  currency_id:
    type: string
    description: The unique ID of the currency. [GET /currencies](https://carecloud.readme.io/reference/getcurrencies)
    example: "8bed991c68a470e7aaeffbf048"
  campaign_id:
    type: string
    description: The unique ID of the campaign. [GET /campaigns](https://carecloud.readme.io/reference/getcampaigns)
    example: "8ad8b2b701199684f1222961d6"
  value:
    type: number
    format: float
    description: Value of the product.
    example: 50
  value_type_id:
    type: integer
    enum:
      - 1
      - 2
    description: Type of value (1 - percentage discount value, 2 - final price).
    example: 1
  valid_from:
    type: string
    description: "Timestamp from which the campaign product is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2021-04-16 00:00:00"
  valid_to:
    type: string
    description: "Timestamp until which the campaign product is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2021-05-16 23:59:59"
  display_in:
    type: array
    items:
      type: string
    description: List of possible display places.
    example: [ "mapi" ]
  type_id:
    type: string
    description: Type of a campaign product.
    example: "86e05affc7a7abefcd513ab400"
  presentation_data:
    $ref: '../schemas/_index.yaml#/CampaignPresentationData'
  campaign_product_property_records:
    type: array
    items:
      $ref: '../schemas/_index.yaml#/PropertyRecord'
    readOnly: true
    default: false
    description: List of campaign product property records.
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2021-04-16 19:02:22"
  state:
    type: integer
    enum:
      - 0
      - 1
    readOnly: true
    description: |
      State of the campaign product.
      *Possible values are: 0 - blocked / 1 - active*
    example: 1
required:
  - product_id
  - currency_id
  - campaign_id
  - value
  - value_type_id
  - valid_from
  - valid_to
  - type_id
  - presentation_data