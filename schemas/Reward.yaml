type: object
readOnly: true
description: Reward structure.
properties:
  reward_id:
    type: string
    readOnly: true
    description: The unique ID of the reward.
    example: "83cfee22eabfbbb15a14815e30"
  code:
    type: string
    description: Code of the reward.
    example: "REWARD-001"
  name:
    type: string
    description: Name of the reward.
    example: "Dessert+Caffe"
  note:
    type: string
    description: Additional text.
    example: ""
  subtitle:
    type: string
    description: Text of subtitle.
    example: "Valid for all menu items"
  points_cost:
    type: number
    format: float
    description: Number of points that will be spent by the voucher redemption.
    example: 200
  valid_time_from:
    type: string
    description: "Time from which the reward is valid in ISO-8601 format (`HH:MM:SS`). All times are in the local timezone."
    example: "09:00:00"
  valid_time_to:
    type: string
    description: "Time until which the reward is valid in ISO-8601 format (`HH:MM:SS`). All times are in the local timezone."
    example: "22:00:00"
  reward_group:
    type: integer
    enum:
      - 0
      - 1
      - 2
      - 4
    description: |
      The unique ID of the reward group.
      *Possible values: 0 - party time voucher / 1 - catalog voucher / 2 - campaign voucher/ 4 - simple reward / 5 - gift reward (Multi Purpose Reward)*
    example: 0
  reward_type_id:
    type: string
    readOnly: true
    description: "The unique ID of the reward type. The reward type describes the reward behavior. For example, a Percentage discount, Buy one + get one discounted product, and others. [GET /reward-types](https://carecloud.readme.io/reference/getrewardtypes)"
    example: "8fdd651ff3f615bcebebad87ce"
  store_list:
    type: array
    items:
      $ref: '../schemas/_index.yaml#/Store'
    description: List of the stores where the reward can be redeemed.
  additional_properties:
    type: array
    items:
      $ref: '../schemas/_index.yaml#/PropertyRecord'
    description: Additional properties.
  priority:
    type: integer
    enum:
      - 1
      - 2
      - 3
      - 4
      - 5
      - 6
      - 7
      - 8
      - 9
    description: Priority of the reward. *1 is the highest priority*
    example:
  image_urls:
    type: array
    items:
      type: string
      example:
    readOnly: true
    description: List of reward image URL addresses.
  reward_external_url:
    type: string
    readOnly: true
    description: External URL addresses.
    example:
  has_product_condition:
    type: boolean
    readOnly: true
    description: Parameter says, if there is product condition on reward.
    example: true
  has_group_condition:
    type: boolean
    readOnly: true
    description: Parameter says, if there is group condition on reward.
    example: false
  has_brand_condition:
    type: boolean
    readOnly: true
    description: Parameter says, if there is brand condition on reward.
    example: false
  has_product_bonus:
    type: boolean
    readOnly: true
    description: Parameter says, if there is product bonus on reward.
    example: true
  has_group_bonus:
    type: boolean
    description: Parameter says, if there is group bonus on reward.
    example: false
  has_brand_bonus:
    type: boolean
    readOnly: true
    description: Parameter says, if there is brand bonus on reward.
    example: false
  reward_product_relation_conditions:
    type: array
    items:
      $ref: '../schemas/_index.yaml#/RewardProductRelationCondition'
    readOnly: true
    description: Conditions between reward and product.
  reward_product_relation_bonuses:
    type: array
    items:
      $ref: '../schemas/_index.yaml#/RewardProductRelationBonus'
    readOnly: true
    description: Bonuses between reward and product.
  is_automated:
    type: boolean
    description: Parameter says, if reward is automated or not. If the reward is automated, it means it is applied by the rules of the reward. Otherwise, it has to be applied manually.
    example: false
  tags:
    type: array
    items:
        $ref: '../schemas/_index.yaml#/Tag'
    readOnly: true
    description: List of the tags assigned to the reward.
  last_change:
    type: string
    readOnly: true
    description: Date and time of the last change. *(YYYY-MM-DD HH:MM:SS)*
    example: "2013-07-24 21:33:33"
  state:
    type: integer
    enum:
      - 0
      - 1
      - 2
    readOnly: true
    description: |
      State of the reward
      *Possible values are: 0 - deleted / 1 - active / 2 - non active*
    example: 1
required:
  - code
  - name
  - reward_group
  - store_list