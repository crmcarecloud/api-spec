type: object
description: Campaign product store record.
properties:
  campaign_product_store_record_id:
    type: string
    readOnly: true
    description: The unique ID of the campaign product store record.
    example: "8bed991c68a470e7aaeffbf048"
  store_id:
    type: string
    description: The unique ID of the store. [GET /stores](https://carecloud.readme.io/reference/getstores)
    example: "8bed991c68a470e7aaeffbf048"
  campaign_product_id:
    type: string
    description: The unique ID of the campaign product. [GET /campaign-products](https://carecloud.readme.io/reference/getcampaignproducts)
    example: "81eaeea13b8984a169c490a325"
required:
  - store_id
  - campaign_product_id