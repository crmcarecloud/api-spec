type: object
description: Product reservation comment structure.
properties:
  comment_text:
    type: string
    readOnly: true
    description: Text of the product reservation comment.
    example: "The customer will pick up the reservation tonight."
  comment_time:
    type: string
    readOnly: true
    description: "Timestamp of the product reservation comment. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2012-11-22 20:57:04"
