type: object
description: Voucher resource for the batch processing.
properties:
  reward_id:
    type: string
    description: The unique ID of the reward.
    example: "83cfee22eabfbbb15a14815e30"
  customer_id:
    type: string
    description: The unique ID of the customer.
    example: "81ceb8582e2d8dbb7e71b7273b"
  store_id:
    type: string
    description: The unique ID of the store where voucher was applied.
    example: "86e05affc7a7abefcd513ab400"
  code:
    type: string
    description: Code of the voucher.
    example: "w7TU7KfeE"
  value:
    type: number
    format: float
    description: Value of the voucher when applied by the purchase.
    example: 3.49
  applied_date:
    type: string
    description: "Timestamp of the voucher application. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2013-07-24 21:33:13"
  valid_from:
    type: string
    description: "Timestamp from which the voucher is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example:
  valid_to:
    type: string
    description: "Timestamp until which the voucher is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example:
  note:
    type: string
    description: Voucher's note.
    example: "Contact before use"
required:
  - reward_id
  - customer_id