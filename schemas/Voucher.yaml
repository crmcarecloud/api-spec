type: object
description: Customer's voucher.
properties:
  voucher_id:
    type: string
    readOnly: true
    description: The unique ID of the voucher.
    example: "8bb7345976bbc9ed20e5083dd6"
  customer_id:
    type: string
    description: The unique ID of the customer. [GET /customers](https://carecloud.readme.io/reference/getcustomers)
    example: "81ceb8582e2d8dbb7e71b7273b"
  store_id:
    type: string
    description: The unique ID of the store where the voucher was applied. [GET /stores](https://carecloud.readme.io/reference/getstores)
    example: "86e05affc7a7abefcd513ab400"
  code:
    type: string
    description: Code of the voucher.
    example: "w7TU7KfeE"
  value:
    type: number
    format: float
    description: Value of the voucher when applied by the purchase.
    example: 3.49
  applied_date:
    type: string
    description: "Timestamp of the voucher application. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2013-07-24 21:33:13"
  valid_from:
    type: string
    description: "Timestamp from which the voucher is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2013-07-10 21:33:13"
  valid_to:
    type: string
    description: "Timestamp until which the voucher is valid. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2013-07-30 21:33:13"
  reward_group:
    type: string
    readOnly: true
    description: The unique ID of the reward group.
    example: "83cfee22eabfbbb15a14815e30"
  note:
    type: string
    description: Voucher's note.
    example: "Contact before use"
  reward:
    $ref: '../schemas/_index.yaml#/Reward'
  created_at:
    type: string
    readOnly: true
    description: "Timestamp of the voucher creation. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: "2022-07-24 21:33:13"
  last_change:
    type: string
    readOnly: true
    description: "Timestamp of the last change. Format: `YYYY-MM-DD HH:MM:SS`. All times are in the local timezone."
    example: '2022-07-24 21:33:33'
  state:
    type: integer
    enum:
      - 0
      - 1
      - 2
    readOnly: true
    description: |
      State of the voucher.
      *Possible values are: 0 - deleted / 1 - active / 2 - non active*
    example: 1
required:
  - customer_id