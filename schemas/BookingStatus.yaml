type: object
description: Booking status.
properties:
  booking_status_id:
    type: string
    readOnly: true
    description: The unique ID of the booking status.
    example: "8bf3397ab62d3ffd876fc9ae16"
  name:
    type: string
    description: Name of the booking status in language from request header.
    example: "Pending"
  created_at:
    type: string
    description: "Timestamp of the booking status creation. Accepts the format `YYYY-MM-DD HH:MM:SS` or ISO-8601 format (`YYYY-MM-DDTHH:MM:SS`). All times must be in the local timezone."
    example: "2022-09-14 07:39:08.99493"
  state:
    type: integer
    enum:
      - 0
      - 1
    description: |
      State of the booking status.
      *Possible values are: 0 - blocked / 1 - active*
    example: 1
  last_change:
    type: string
    readOnly: true
    description: Date and time of the last change. *(YYYY-MM-DD HH:MM:SS)*
    example: "2022-09-14 07:39:08.99493"
required:
  - name