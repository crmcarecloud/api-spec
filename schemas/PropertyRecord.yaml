type: object
description: Property record.
properties:
  property_record_id:
    type: string
    readOnly: true
    description: The unique ID of the property record.
    example: "docasna_blokace_darce_do:8ea2591121e636086a4a9c0992"
  property_id:
    type: string
    readOnly: false
    description: The unique ID of the property.
    example: "docasna_blokace_darce_do"
  property_name:
    type: string
    readOnly: true
    description: Name of the property.
    example: "Property #6"
  property_value:
    oneOf:
      - type: string
      - type: number
      - type: integer
      - type: boolean
      - type: array
        items: { }
      - type: object
    readOnly: false
    description: |
      Value of the property record. The format depends on the data type of the property.

      - **string** – a plain text value:
        ```json
        {
          "property_id": "p1_note",
          "property_value": "VIP customer"
        }
        ```

      - **date** – a date string in `YYYY-MM-DD` format:
        ```json
        {
          "property_id": "p1_birth_date",
          "property_value": "1985-06-15"
        }
        ```

      - **integer** – a whole number:
        ```json
        {
          "property_id": "p1_visit_count",
          "property_value": 42
        }
        ```

      - **float** – a decimal number:
        ```json
        {
          "property_id": "p1_average_spend",
          "property_value": 149.90
        }
        ```

      - **enum** – a single-item array containing a PropertyItem object:
        ```json
        {
          "property_id": "p1_favourite_color",
          "property_value": [
            {
              "id": "86e05affc7a7abefcd513ab400",
              "name": "Blue",
              "resource_record_id": null,
              "state": 1
            }
          ]
        }
        ```

      - **multiselect** – a multi-item array of PropertyItem objects:
        ```json
        {
          "property_id": "p1_favourite_color",
          "property_value": [
            {
              "id": "86e05affc7a7abefcd513ab400",
              "name": "Blue",
              "resource_record_id": null,
              "state": 1
            },
            {
              "id": "81eaeea13b8984a169c490a325",
              "name": "Green",
              "resource_record_id": null,
              "state": 1
            }
          ]
        }
        ```

      - **custom data type** – the format depends on the specific data type configuration. For example, a serialized JSON object:
        ```json
        {
          "property_id": "p1_address",
          "property_value": "{\"street\":\"Main St\",\"city\":\"Prague\"}"
        }
        ```
    example: "2002-02-02"
  last_change:
    type: string
    readOnly: true
    description: Date and time of the last change. *(YYYY-MM-DD HH:MM:SS)*
    example: "2023-02-02 00:00:00"
required:
  - property_id