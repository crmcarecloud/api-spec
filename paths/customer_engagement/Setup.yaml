get:
  tags:
    - Customer engagement
  summary: Get a customer engagement setup
  description: |
    Get information about a specific customer engagement setup.

    Returns the full configuration of a single customer engagement setup, which defines the tracking behaviour for a specific deployment of the CareCloud JavaScript tracking script. When a visitor is identified (for example, after login), events captured by the script are linked to the corresponding customer profile.

    This endpoint does not require authentication. To retrieve all available setups, use [GET /customer-engagement-setups](https://carecloud.readme.io/reference/getcustomerengagementsetups).
  operationId: getCustomerEngagementSetup
  parameters:
    - $ref: '../../parameters/_index.yaml#/Accept-Language'
    - $ref: '../../parameters/_index.yaml#/ce_setup_id_path'
  security: []
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            title: GetSetup200Response
            type: object
            properties:
              data:
                $ref: '../../schemas/_index.yaml#/CustomerEngagementSetup'
    '400':
      $ref: '../../api.yaml#/components/responses/BadRequest'
    '403':
      $ref: '../../api.yaml#/components/responses/Forbidden'
    '404':
      $ref: '../../api.yaml#/components/responses/NotFound'
    '405':
      $ref: '../../api.yaml#/components/responses/NotAllowed'
    '429':
      $ref: '../../api.yaml#/components/responses/TooManyRequests'
    '500':
      $ref: '../../api.yaml#/components/responses/InternalServerError'
    '503':
      $ref: '../../api.yaml#/components/responses/ServiceUnavailable'