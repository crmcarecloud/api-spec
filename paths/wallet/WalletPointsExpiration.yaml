get:
  tags:
    - Wallet
  summary: Get points expiration overview
  description: Get information about points of the customer that will expire in the future. You can communicate this information to the customer or you can active him to use these points.
  operationId: getWalletPointsExpiration
  parameters:
    - $ref: '../../parameters/_index.yaml#/Accept-Language'
    - $ref: '../../parameters/_index.yaml#/customer_id_required'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            title: GetWalletPointsExpiration200Response
            type: object
            properties:
              data:
                type: object
                properties:
                  next_amount:
                    type: number
                    format: float
                    description: The amount of customer's points that will expire in the closest future. The exact date of expiration is in the related parameter.
                    example: 77.36
                  next_date:
                    type: string
                    description: |
                      Exact date in local time zone when the customer's points will expire. The date format follows ISO-8601.
                      *YYYY-MM-DD*
                    format: YYYY-MM-DD
                    example: "2022-01-01"
                  current_month_amount:
                    type: number
                    format: float
                    description: The amount of customer's points that will expire in current month.
                    example: 0
    '400':
      $ref: '../../api.yaml#/components/responses/BadRequest'
    '401':
      $ref: '../../api.yaml#/components/responses/Unauthorized'
    '403':
      $ref: '../../api.yaml#/components/responses/Forbidden'
    '404':
      $ref: '../../api.yaml#/components/responses/NotFound'
    '405':
      $ref: '../../api.yaml#/components/responses/NotAllowed'
    '429':
      $ref: '../../api.yaml#/components/responses/TooManyRequests'
    '500':
      $ref: '../../api.yaml#/components/responses/InternalServerError'
    '503':
      $ref: '../../api.yaml#/components/responses/ServiceUnavailable'
  x-codeSamples:
    - lang: PHP
      label: CareCloud SDK
      source: |
        use CrmCareCloud\Webservice\RestApi\Client\ApiException;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\CareCloud;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\Config;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\Data\AuthTypes;

        require_once '../vendor/autoload.php';

        $project_uri = 'https://yourapiurl.com/webservice/rest-api/enterprise-interface/v1.0';
        $login = 'login';
        $password = 'password';
        $external_app_id = 'application_id';
        $auth_type = AuthTypes::BEARER_AUTH;

        $config = new Config($project_uri, $login, $password, $external_app_id, $auth_type);

        $care_cloud = new CareCloud($config);

        // Set Header parameter Accept-Language
        $accept_language = 'en'; //	string | The unique ID of the language code by ISO 639-1 Default: cs, en-gb;q=0.8

        // Set query parameters
        $customer_id = '8ea2591121e636086a4a9c0992'; // string | The unique ID of the customer

        // Call endpoint and get data
        try
        {
            $get_points_expiration = $care_cloud->walletApi()->getWalletPointsExpiration($customer_id, $accept_language);
            $points_expiration = $get_points_expiration->getData();
            var_dump($points_expiration);
        }
        catch(ApiException $e)
        {
            die(var_dump($e->getResponseBody() ?: $e->getMessage()));
        }