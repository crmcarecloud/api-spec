post:
  tags:
    - Cards
  summary: Validate free card
  description: |
    Validates whether a card is free to use — meaning it is not blocked, not assigned to another customer, and exists in the system.

  operationId: postValidateFreeCard
  parameters:
    - $ref: '../../parameters/_index.yaml#/Accept-Language'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            card_number:
              type: string
              description: Card number to validate.
              example: "1000000000016"
          required:
            - card_number
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            title: PostCardValidateFree200Response
            type: object
            properties:
              data:
                type: object
                properties:
                  is_free_to_use:
                    type: boolean
                    enum:
                      - true
                      - false
                    readOnly: true
                    description: An information if the card is free to use.
                    example: false
    '400':
      $ref: '../../api.yaml#/components/responses/BadRequest'
    '401':
      $ref: '../../api.yaml#/components/responses/Unauthorized'
    '403':
      $ref: '../../api.yaml#/components/responses/Forbidden'
    '404':
      $ref: '../../api.yaml#/components/responses/NotFound'
    '405':
      $ref: '../../api.yaml#/components/responses/NotAllowed'
    '429':
      $ref: '../../api.yaml#/components/responses/TooManyRequests'
    '500':
      $ref: '../../api.yaml#/components/responses/InternalServerError'
    '503':
      $ref: '../../api.yaml#/components/responses/ServiceUnavailable'
  x-codeSamples:
    - lang: PHP
      label: CareCloud SDK
      source: |
        use CrmCareCloud\Webservice\RestApi\Client\ApiException;
        use CrmCareCloud\Webservice\RestApi\Client\Model\ActionsValidatefreecardBody;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\CareCloud;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\Config;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\Data\AuthTypes;

        require_once '../vendor/autoload.php';

        $project_uri = 'https://yourapiurl.com/webservice/rest-api/enterprise-interface/v1.0';
        $login = 'login';
        $password = 'password';
        $external_app_id = 'application_id';
        $auth_type = AuthTypes::BEARER_AUTH;

        $config = new Config($project_uri, $login, $password, $external_app_id, $auth_type);

        $care_cloud = new CareCloud($config);

        // Set Header parameter Accept-Language
        $accept_language = 'en'; //	string | The unique ID of the language code by ISO 639-1 Default: cs, en-gb;q=0.8

        // Set request body
        $body = new ActionsValidatefreecardBody();
        $body->setCardNumber('1000000000016'); // string | Card number to validate

        // Call endpoint and post data
        try
        {
            $post_validate_free_card = $care_cloud->cardsApi()->postValidateFreeCard($body, $accept_language);
            $is_free_to_use = $post_validate_free_card->getData()->getIsFreeToUse();
            var_dump($is_free_to_use);
        }
        catch(ApiException $e)
        {
            die(var_dump($e->getResponseBody() ?: $e->getMessage()));
        }
