post:
  tags:
    - Customers actions
  summary: Set the customer's push notifications
  description: |
    Set up customer push notifications for a specific application and device.

    Registers a push notification token (Apple or Android) for a customer account and links it to the specified external application and device ID. This enables the CareCloud platform to send push notifications to the customer's device. If a token is already registered for the same device ID, it is replaced.

    To unregister a device, use [POST /customers/actions/cancel-push-notifications](https://carecloud.readme.io/reference/postcustomercancelpushnotifications) (enterprise interface only).

    ⚠️ The endpoint is available only in the Enterprise interface.
    ⚠️ Please make sure the ID of the device is unique. You will avoid problems with signing off other devices.
  operationId: postCustomerSetPushNotifications
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            customer_id:
              type: string
              description: The unique ID of the customer.
              example: "8ea2591121e636086a4a9c0992"
            device:
              $ref: '../../schemas/_index.yaml#/Device'
            external_application_id:
              type: string
              description: ID of the external application. More information about external applications and how to get an ID is available in [Authentication section](https://carecloud.readme.io/reference/authentication#external-applications-1).
              example: "82de12eb8b138791e678fd11c3"
            push_token:
              type: string
              description: Push notification token (Apple or Google).
              example: "4f7f658bfa7a5959e093590"
          required:
            - customer_id
            - device
            - external_application_id
            - push_token
  responses:
    '204':
      description: No Content
    '400':
      $ref: '../../api.yaml#/components/responses/BadRequest'
    '401':
      $ref: '../../api.yaml#/components/responses/Unauthorized'
    '403':
      $ref: '../../api.yaml#/components/responses/Forbidden'
    '404':
      $ref: '../../api.yaml#/components/responses/NotFound'
    '405':
      $ref: '../../api.yaml#/components/responses/NotAllowed'
    '429':
      $ref: '../../api.yaml#/components/responses/TooManyRequests'
    '500':
      $ref: '../../api.yaml#/components/responses/InternalServerError'
    '503':
      $ref: '../../api.yaml#/components/responses/ServiceUnavailable'