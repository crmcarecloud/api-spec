post:
  tags:
    - Customers actions
  summary: Sign up for newsletters
  description: |
    Sign up a contact for the newsletter. The contact does not need to be an existing customer.
    ⚠️ We strongly recommend verifying the contact with CAPTCHA before sending a request to CareCloud API.

    **Partner assignment**

    When a contact is signed up, CareCloud creates one or more customer-partner relations. The assignment is determined as follows:

    - If `partner_records` is provided (non-empty array) - relations are created for exactly those partners.
    - If `partner_records` is an empty array (`[]`) or omitted - relations are created for all partners accessible to the authenticated API user.

    Because this endpoint returns no customer ID, partner assignment cannot be managed after the call. Use `partner_records` to control assignment at sign-up time.
  operationId: postCustomerNewslettersSignUp
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            contact:
              type: string
              description: 'The parameter could contain email, phone number or other identifier of the contact.'
              example: "happy_customer@crmcarecloud.com"
            customer_source_id:
              type: string
              description: The unique ID of the customer source.
              example: "86e05affc7a7abefcd513ab400"
            agreements:
              $ref: '../../schemas/_index.yaml#/Agreement'
            language_id:
              type: string
              description: The unique ID of the language by ISO 639-1 code.
              example: "en"
            partner_records:
              type: array
              description: |
                List of partners to associate with the signed-up contact. When provided as a non-empty array, partner assignment is based solely on this list. An empty array is treated the same as omitting this field. See the partner assignment rules in the endpoint description for the full precedence logic. [GET /partners](https://carecloud.readme.io/reference/getpartners)
              items:
                $ref: '../../schemas/_index.yaml#/PartnerRecord'
              example:
                - partner_id: "86e05affc7a7abefcd513ab400"
          required:
            - contact
            - customer_source_id
  responses:
    '204':
      description: No Content
    '400':
      $ref: '../../api.yaml#/components/responses/BadRequest'
    '401':
      $ref: '../../api.yaml#/components/responses/Unauthorized'
    '403':
      $ref: '../../api.yaml#/components/responses/Forbidden'
    '404':
      $ref: '../../api.yaml#/components/responses/NotFound'
    '405':
      $ref: '../../api.yaml#/components/responses/NotAllowed'
    '429':
      $ref: '../../api.yaml#/components/responses/TooManyRequests'
    '500':
      $ref: '../../api.yaml#/components/responses/InternalServerError'
    '503':
      $ref: '../../api.yaml#/components/responses/ServiceUnavailable'