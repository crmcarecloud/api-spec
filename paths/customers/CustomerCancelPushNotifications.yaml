post:
  tags:
    - Customers actions
  summary: Cancel the customer's push notifications subscription from all devices if push token not specified.
  description: |
    Cancel push notification subscriptions for a customer.

    Unregisters a customer's push notification token for a specified external application. If `push_token` is provided, only that specific device registration is removed. If `push_token` is omitted, all device registrations for the customer and application are cancelled.

    To register a device for push notifications, use [POST /customers/actions/set-push-notifications](https://carecloud.readme.io/reference/postcustomersetpushnotifications) (enterprise interface only).

    ⚠️ The endpoint is available only in the Enterprise interface.
  operationId: postCustomerCancelPushNotifications
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            customer_id:
              type: string
              description: The unique ID of the customer.
              example: "8ea2591121e636086a4a9c0992"
            external_application_id:
              type: string
              description: ID of the external application. More information about external applications and how to get an ID is available in [Authentication section](https://carecloud.readme.io/reference/authentication#external-applications-1).
              example: "82de12eb8b138791e678fd11c3"
            push_token:
              type: string
              description: Push notification token (Apple or Google).
              example: "4f7f658bfa7a5959e093590"
          required:
            - customer_id
            - external_application_id
  responses:
    '204':
      description: No Content
    '400':
      $ref: '../../api.yaml#/components/responses/BadRequest'
    '401':
      $ref: '../../api.yaml#/components/responses/Unauthorized'
    '403':
      $ref: '../../api.yaml#/components/responses/Forbidden'
    '404':
      $ref: '../../api.yaml#/components/responses/NotFound'
    '405':
      $ref: '../../api.yaml#/components/responses/NotAllowed'
    '429':
      $ref: '../../api.yaml#/components/responses/TooManyRequests'
    '500':
      $ref: '../../api.yaml#/components/responses/InternalServerError'
    '503':
      $ref: '../../api.yaml#/components/responses/ServiceUnavailable'