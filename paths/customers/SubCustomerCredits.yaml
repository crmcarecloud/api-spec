get:
  tags:
    - Customers
  summary: Get all customer credit records
  description: |
    Get information about all customer credit records.

    Returns all credit records on the customer's account. Credits are the monetary loyalty currency stored in a customer's wallet. Each record has an amount, credit type, currency, partner, and creation timestamp.

    To see a chronological audit log of all credit operations (deposits, reductions, transfers), use [GET /credit-history](https://carecloud.readme.io/reference/getcredithistory).
  operationId: getSubCustomerCredits
  parameters:
    - $ref: '../../parameters/_index.yaml#/Accept-Language'
    - $ref: '../../parameters/_index.yaml#/customer_id_path'
    - $ref: '../../parameters/_index.yaml#/count'
    - $ref: '../../parameters/_index.yaml#/offset'
    - $ref: '../../parameters/_index.yaml#/sort_field'
    - $ref: '../../parameters/_index.yaml#/sort_direction'
    - $ref: '../../parameters/_index.yaml#/credit_type_id'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            title: GetSubCustomerCredits200Response
            type: object
            properties:
              data:
                type: object
                properties:
                  credits:
                    type: array
                    description: List of the credit records.
                    items:
                      $ref: '../../schemas/_index.yaml#/Credit'
                  total_items:
                    type: integer
                    description: The number of all found credit records.
                    example: 1
    '400':
      $ref: '../../api.yaml#/components/responses/BadRequest'
    '401':
      $ref: '../../api.yaml#/components/responses/Unauthorized'
    '403':
      $ref: '../../api.yaml#/components/responses/Forbidden'
    '404':
      $ref: '../../api.yaml#/components/responses/NotFound'
    '405':
      $ref: '../../api.yaml#/components/responses/NotAllowed'
    '429':
      $ref: '../../api.yaml#/components/responses/TooManyRequests'
    '500':
      $ref: '../../api.yaml#/components/responses/InternalServerError'
    '503':
      $ref: '../../api.yaml#/components/responses/ServiceUnavailable'