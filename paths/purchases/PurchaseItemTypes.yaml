get:
  tags:
    - Purchase item types
  summary: Get all purchase item types
  description: |
    Get a list of purchase item types accepted in CRM CareCloud. Each type determines how CareCloud processes the item within a purchase, including which loyalty rules and discounts apply.

    > **Note:** Type names may vary between CareCloud projects and can be customized per deployment. The names listed here are approximate references only. Always use `type_id` to identify a purchase item type in your integration — do not rely on the name.

    ---

    ## Often used types

    **Transaction in a store**
    The standard type for items purchased in a brick-and-mortar retail store. This is the most commonly used type for in-store transactions. All standard loyalty and discount rules apply.

    **E-commerce transaction**
    The standard type for items purchased through an online store or e-commerce channel. This is the most commonly used type for online transactions. All standard loyalty and discount rules apply.

    **Cancel**
    Used to mark canceled purchase items. Assigning this type to an item identifies it as a cancellation within the purchase, making it easier to track and process.

    ---

    ## Special types with effects

    These types alter the default loyalty and discount behavior in CareCloud.

    **Item without reward application**
    Items of this type are excluded from all reward and discount calculations — no discounts or rewards can be applied. However, loyalty points can still be collected for these items, and customers can use loyalty points to pay for them.

    **OTC without loyalty**
    Over-the-counter (OTC) refers to products sold without a prescription, most commonly in pharmacy retail. In wider retail contexts, the term also covers items sold at a service counter that are typically excluded from promotions, such as tobacco, lottery tickets, or gift cards. Items of this type do not earn loyalty points and are not eligible for any discounts or rewards.

    **Point payments only**
    Items of this type can only be paid for using loyalty points. No discounts or rewards are applied.
  operationId: getPurchaseItemTypes
  parameters:
    - $ref: '../../parameters/_index.yaml#/Accept-Language'
    - $ref: '../../parameters/_index.yaml#/count'
    - $ref: '../../parameters/_index.yaml#/offset'
    - $ref: '../../parameters/_index.yaml#/sort_field'
    - $ref: '../../parameters/_index.yaml#/sort_direction'
    - $ref: '../../parameters/_index.yaml#/text_id'
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            title: GetPurchaseItemTypes200Response
            type: object
            properties:
              data:
                type: object
                properties:
                  purchase_item_types:
                    type: array
                    description: List of the purchase item types.
                    items:
                      $ref: '../../schemas/_index.yaml#/Purchase-item-type'
                  total_items:
                    type: integer
                    description: The number of all found purchase types.
                    example: 1
    '400':
      $ref: '../../api.yaml#/components/responses/BadRequest'
    '401':
      $ref: '../../api.yaml#/components/responses/Unauthorized'
    '403':
      $ref: '../../api.yaml#/components/responses/Forbidden'
    '404':
      $ref: '../../api.yaml#/components/responses/NotFound'
    '405':
      $ref: '../../api.yaml#/components/responses/NotAllowed'
    '429':
      $ref: '../../api.yaml#/components/responses/TooManyRequests'
    '500':
      $ref: '../../api.yaml#/components/responses/InternalServerError'
    '503':
      $ref: '../../api.yaml#/components/responses/ServiceUnavailable'
  x-codeSamples:
    - lang: PHP
      label: CareCloud SDK
      source: |
        use CrmCareCloud\Webservice\RestApi\Client\ApiException;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\CareCloud;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\Config;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\Data\AuthTypes;

        require_once '../vendor/autoload.php';

        $project_uri = 'https://yourapiurl.com/webservice/rest-api/enterprise-interface/v1.0';
        $login = 'login';
        $password = 'password';
        $external_app_id = 'application_id';
        $auth_type = AuthTypes::BEARER_AUTH;

        $config = new Config($project_uri, $login, $password, $external_app_id, $auth_type);

        $care_cloud = new CareCloud($config);

        // Set Header parameter Accept-Language
        $accept_language = 'en'; //	string | The unique ID of the language code by ISO 639-1 Default: cs, en-gb;q=0.8

        // Set query parameters
        $count = 10; // integer >= 1 | The number of records to return (optional, default is 100)
        $offset = 0; // integer | The number of records from a collection to skip (optional, default is 0)
        $sort_field = null; // string | One of the query string parameters for sorting (optional, default is null)
        $sort_direction = 'DESC'; // string | Direction of sorting the response list (optional, default is null)

        // Call endpoint and get data
        try
        {
            $get_purchase_item_types = $care_cloud->purchaseItemTypesApi()->getPurchaseItemTypes(
                $accept_language,
                $count,
                $offset,
                $sort_field,
                $sort_direction
            );
            $purchase_item_types = $get_purchase_item_types->getData()->getPurchaseItemTypes();
            $total_items = $get_purchase_item_types->getData()->getTotalItems();
            var_dump($purchase_item_types);
            var_dump($total_items);
        }
        catch(ApiException $e)
        {
            die(var_dump($e->getResponseBody() ?: $e->getMessage()));
        }