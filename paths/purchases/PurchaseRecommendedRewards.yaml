post:
  tags:
    - Purchases
  summary: Provides a list of rewards and vouchers available for purchase closure
  description: |
    Method returns all rewards and vouchers available for a specific client application (e-commerce, POS, etc.).
    The response includes reward definitions and customer-specific vouchers that are valid at the time of the request. For each item, a parameter defines the maximum usage per purchase.
    If the value of this parameter is zero, the item cannot be applied.

    Each item in the response can represent one of two types:
     - Reward definition - a catalog-level reward identified by an alphanumeric code (for example, `PTV12`).
     - Voucher - a reward issued to a specific customer, identified by a numeric code generated by CareCloud or a custom code syntax defined by the client.

    Rewards are always associated with products via bill items.
  operationId: postPurchaseRecommendedRewards
  parameters:
    - $ref: '../../parameters/_index.yaml#/Accept-Language'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            store_id:
              type: string
              description: |
                The store ID identifies the store or business unit that will close the purchase for the customer.
                The list of all stores is available at the endpoint [GET /stores](https://carecloud.readme.io/reference/getstores)
              example: "8bed991c68a470e7aaeffbf048"
            cashdesk_number:
              type: integer
              description: |
                Number of the cash desk in the store. Used to identify a specific cash desk when multiple are available.
              example: 1
            card_number:
              type: string
              description: The customer card number.
              example: "1000000000016"
            customer_id:
              type: string
              description: |
                ID of the customer who is closing the purchase. You can search for customers by various parameters in the [GET /customers](https://carecloud.readme.io/reference/getcustomers) endpoint.
              example: "8ea2591121e636086a4a9c0992"
            reward_list_type:
              type: string
              enum:
                - F
                - C
                - A
              description: |
                Specifies the type of rewards to be listed in the response.
                Possible values:
                 - F (full) - All manual rewards that are valid in the defined store
                 - C (condensed) -  Returns manual rewards that are related to the items from provided purchase. If application is not possible, the reward is not returned.
                 - A (all) -  List of all available rewards on the project (including automatic rewards). Extended information about rewards is available at the endpoint [GET /rewards](https://carecloud.readme.io/reference/getrewards)
              example: "C"
            bill:
              $ref: '../../schemas/_index.yaml#/Bill'
          required:
            - store_id
            - cashdesk_number
            - reward_list_type
            - bill

  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            title: PostPurchaseRecommendedRewards200Response
            type: object
            properties:
              data:
                type: object
                properties:
                  recommended_best_rewards:
                    type: array
                    description: List of the best rewards for a specific client application (e-commerce, POS, etc.).
                    items:
                      $ref: '../../schemas/_index.yaml#/RecommendedReward'
                  total_items:
                    type: integer
                    description: The number of all found rewards.
                    example: 1
    '400':
      $ref: '../../api.yaml#/components/responses/BadRequest'
    '401':
      $ref: '../../api.yaml#/components/responses/Unauthorized'
    '403':
      $ref: '../../api.yaml#/components/responses/Forbidden'
    '404':
      $ref: '../../api.yaml#/components/responses/NotFound'
    '405':
      $ref: '../../api.yaml#/components/responses/NotAllowed'
    '429':
      $ref: '../../api.yaml#/components/responses/TooManyRequests'
    '500':
      $ref: '../../api.yaml#/components/responses/InternalServerError'
    '503':
      $ref: '../../api.yaml#/components/responses/ServiceUnavailable'
  x-codeSamples:
    - lang: PHP
      label: CareCloud SDK
      source: |
        use CrmCareCloud\Webservice\RestApi\Client\ApiException;
        use CrmCareCloud\Webservice\RestApi\Client\Model\ActionsRecommendedbestrewardsBody;
        use CrmCareCloud\Webservice\RestApi\Client\Model\Bill;
        use CrmCareCloud\Webservice\RestApi\Client\Model\BillItem;
        use CrmCareCloud\Webservice\RestApi\Client\Model\PluId;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\CareCloud;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\Config;
        use CrmCareCloud\Webservice\RestApi\Client\SDK\Data\AuthTypes;

        require_once '../vendor/autoload.php';

        $project_uri = 'https://yourapiurl.com/webservice/rest-api/enterprise-interface/v1.0';
        $login = 'login';
        $password = 'password';
        $external_app_id = 'application_id';
        $auth_type = AuthTypes::BEARER_AUTH;

        $config = new Config($project_uri, $login, $password, $external_app_id, $auth_type);

        $care_cloud = new CareCloud($config);

        // Set Header parameter Accept-Language
        $accept_language = 'en'; //	string | The unique ID of the language code by ISO 639-1 Default: cs, en-gb;q=0.8

        // Set the bill info
        $plu_ids = new PluId();
        $plu_ids->setListCode('GLOBAL');
        $plu_ids->setCode('r456');

        $bill_item = new BillItem();
        $bill_item->setPluIds(array($plu_ids));
        $bill_item->setPluName('Teapot');
        $bill_item->setCategoryPluId('1110001');
        $bill_item->setVatRate(0);
        $bill_item->setQuantity(1);
        $bill_item->setPaidAmount(100);
        $bill_item->setPrice(100);
        $bill_item->setBillItemId('teapot_id_01');
        $bill_item->setLoyaltyOff(true);
        $bill_item->setPurchaseItemTypeId('86e05affc7a7abefcd513ab400');
        $bill_item->setCustomerId(null);

        $bill = new Bill();
        $bill->setBillId('bill001');
        $bill->setBillNumber(null);
        $bill->setPaymentTime('2022-10-30T15:51:49+02:00');
        $bill->setCreatedBy(null);
        $bill->setCurrencyId('8bed991c68a470e7aaeffbf048');
        $bill->setTotalPrice(100);
        $bill->setBillItems(array($bill_item));

        // Set the request body
        $body = new ActionsRecommendedbestrewardsBody();
        $body->setStoreId('8bed991c68a470e7aaeffbf048');
        $body->setCashdeskNumber(1);
        $body->setCardNumber(null);
        $body->setCustomerId(null);
        $body->setRewardListType('A');
        $body->setBill($bill);

        // Call endpoint and get data
        try
        {
            $post_best_rewards = $care_cloud->purchasesApi()->postPurchaseRecommendedRewards($body, $accept_language);
            $best_rewards = $post_best_rewards->getData()->getRecommendedBestRewards();
            $total_items = $post_best_rewards->getData()->getTotalItems();
            var_dump($best_rewards);
            var_dump($total_items);
        }
        catch(ApiException $e)
        {
            die(var_dump($e->getResponseBody() ?: $e->getMessage()));
        }